aid: peoplesoft-financials
name: PeopleSoft Financials
description: >-
  API collection for Oracle PeopleSoft Financials suite covering General Ledger,
  Accounts Payable, Accounts Receivable, Asset Management, and other financial
  modules.
type: Index
position: Consumer
access: 3rd-Party
image: https://www.oracle.com/a/ocom/img/logo-peoplesoft.svg
url: >-
  https://raw.githubusercontent.com/api-evangelist/peoplesoft-financials/refs/heads/main/apis.yml
tags:
  - Enterprise
  - ERP
  - Financials
  - Oracle
  - PeopleSoft
created: '2024-01-01'
modified: '2026-04-28'
specificationVersion: '0.19'
apis:
  - aid: peoplesoft-financials:general-ledger
    name: PeopleSoft General Ledger API
    description: >-
      REST API for managing general ledger operations including journals,
      chartfields, budgets, and financial reporting.
    image: https://www.oracle.com/a/ocom/img/logo-peoplesoft.svg
    humanURL: https://docs.oracle.com/cd/E92519_02/pt856pbr3/eng/pt/index.html
    baseURL: https://{hostname}:{port}/psrestservice/financials/gl/
    tags:
      - ChartFields
      - Financial Reporting
      - General Ledger
      - Journals
    properties:
      - type: Documentation
        url: https://docs.oracle.com/cd/E92519_02/fscm92pbr30/eng/fscm/rest_services/index.html
    contact:
      - FN: Oracle Support
        email: support@oracle.com
        url: https://support.oracle.com
