name: PeopleSoft Financials
description: >-
  API collection for Oracle PeopleSoft Financials suite covering General Ledger, Accounts
  Payable, Accounts Receivable, Asset Management, and other financial modules.
image: https://www.oracle.com/a/ocom/img/logo-peoplesoft.svg
url: https://www.oracle.com/applications/peoplesoft/
tags:
  - Enterprise
  - ERP
  - Financials
  - Oracle
  - PeopleSoft
created: '2024'
modified: '2024'
apis:
