      - Financial Reporting
      - General Ledger
      - Journals
    serviceName: PeopleSoft General Ledger API
    serviceCategory: API
  - name: PeopleSoft Accounts Payable API
    baseURL: https://{hostname}:{port}/psrestservice/financials/ap/
